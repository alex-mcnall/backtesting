name: Unit tests

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'LICENSE'

jobs:
  Test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all unit tests
        run: |
          pip install pytest
          pytest tests/

      - name: Check code coverage
        run: |
          pytest --cov-report=term-missing:skip-covered --cov-report=markdown-append:$GITHUB_STEP_SUMMARY --cov=src tests/
